r\u003especifications and modifications across the entire API lifecycle.","introInnovation.title":"Integrated API innovation","introInnovation.subtitle":"Apidog seamlessly integrates every stage of the API development process, achieving one single truth for all.","introInnovation.protocol.title":"Multi-protocol Support","introInnovation.protocol.content":"Create, organize, share, and execute HTTP, REST, GraphQL, SOAP, or WebSocket requests without App switching.","introInnovation.design.title":"Design while Debugging","introInnovation.design.content":"Debug mode allows developers to define APIs while debugging APIs, with modifications to request and response being saved directly to the API definition.","introInnovation.idea.title":"Apidog IDEA plugin","introInnovation.idea.content":"The Apidog IDEA plugin allows back-end developers to generate API specifications directly from JavaDoc comments and automatically synchronize them with Apidog, without the need for invasive annotations.","introInnovation.database.title":"Connect to Databases","introInnovation.database.content":"Apidog supports retrieving data from databases such as MySQL, SQLServer, Oracle, PostgreSQL, and ClickHouse for use in requests and pre-/post-processors.","introInnovation.compatible.title":"Compatible with Postman","introInnovation.compatible.content":"Postman scripts can be run directly in Apidog without any modifications needed, and it also supports both public and folder-level scripts.","introInnovation.apihub.title":"API Hub","introInnovation.apihub.content":"You can explore thousands of public APIs from around the world in the API Hub, and also publish your own APIs to the API Hub.","feature.title":"One workflow for your entire API lifecycle","feature.subtitle":"From design to testing and docs, keep every API workflow in one source of truth.","feature.design.title":"Design \u0026 Develop APIs Faster \u0026 Together","feature.design.content":"Effortlessly describe your API as you test it, and generate JSON/XML schemas with a simple click. Branches supported.","feature.test.title":"Automate end‑to‑end API test flows","feature.test.content":"Create low‑code test scenarios with assertions and branching logic to verify full workflows, guard against regressions, and integrate seamlessly into CI/CD pipelines .","feature.doc.title":"Keeping API documentation updated","feature.doc.content":"Turn your live specs into sleek web pages—supporting \"Try It Out\", code samples, versioning, and custom domains—all auto‑generated and visually appealing","feature.mock.title":"Instant mock servers from your API spec","feature.mock.content":"Generate realistic mock responses based on field names and schemas—letting frontend teams work independently even before backend is ready","learnMore":"Learn More","developersSays.title":"Developers Love Apidog","developersSays.subtitle":"Apidog implements API Design-first, facilitating the effortless synchronization of API, specifications and modifications across the entire API lifecycle.","developersSays.be":"“Apidog has helped me realize the advantages of taking an API design-first approach. By defining APIs for each endpoint, Apidog's response validation tool enables me to quickly catch and fix errors, which boosts my productivity and saves me time.”","developersSays.qa":"“My favorite feature of Apidog is the automated testing for regression testing. Whenever there is a change in the API, I can automatically synchronize the latest definition without having to modify my test cases each time, which used to be the most tedious part of my work.”","developersSays.full":"“With Apidog's automated testing and documentation features, I can focus on creating high-quality APIs and delivering exceptional products.”","developersSays.fe":"“I don't have to concatenate API request parameters or fabricate mock data. With the API specification in hand, everything is readily available, and just a single click solves all the painful issues.”","developersSays.tm":"“Our engineers proactively maintain standardized API documentation because they have found it enhances the efficiency of every team member. ”","developer.role.backEnd":"Back-end Developer","developer.role.qa":"QA Engineer","developer.role.fullStack":"Full-stack Engineer","developer.role.frontEnd":"Front-end Developer","developer.role.TechManager":"Tech Manager","developer.takashi":"Takashi Nakamura","practice.title":"Practice API Design-first in Apidog","practice.subtitle":"Discover an easier way to build and use APIs","about.title":"Revolutionizing API Development","about.subtitle":"Our Journey at Apidog","about.statement.one":"At Apidog, our journey began with a clear vision: to simplify and enhance the collaborative aspects of API development. Our story is driven by a commitment to redefine the landscape of API development. Born out of a realization that existing tools are hindering rather than facilitating effective teamwork, we set out on this transformative journey in 2020.","about.statement.two":"At Apidog, we have meticulously crafted a robust API development platform to enhance your API development experience. Covering every stage from inception to optimization, we address all aspects of API development, including designing, debugging, testing, mocking, and documenting APIs. Our primary objective is to optimize your workflow, save your valuable time, and empower your team with seamless collaboration.","about.statement.three":"Whether you're initiating a brand-new API project or fine-tuning an existing one, Apidog stands as your unwavering partner throughout your API development journey. Our intuitive visual editor, combined with powerful debugging tools and user-friendly testing and documentation features, ensures you can create APIs that precisely align with both your needs and those of your users.","about.statement.four":"We're not just about APIs; we're about transforming possibilities. At Apidog, we believe in the profound impact APIs can have on the world. Our mission is to make API development accessible and collaborative for everyone. Join us and experience firsthand how Apidog is reshaping the future of API development.","about.viewpoint.title":"Our Core Viewpoints","about.viewpoint.item.liquidity":"Liquidity","about.viewpoint.item.liquidity.content":"At Apidog, we advocate for the fluidity of data throughout the development process. From the inception of product requirements to the creation of API documentation, from the formulation of business implementation code to the crafting of unit test code, from the generation of mock data to the creation of test scripts, and from the collaborative efforts of the API development team to the end-users – we envision a seamless flow of information. This approach serves as the cornerstone for achieving maximum efficiency and effectiveness in our collaborative endeavors.","about.viewpoint.item.automation":"Automation","about.viewpoint.item.automation.content":"We prioritize efficiency by minimizing repetitive tasks and infusing automation into every step. This allows us to channel our focus towards critical points, while repetitive tasks can be managed by automation. Whether it's generating API code, test data, API request samples, mock data, or test steps, our commitment extends to automating every feasible aspect. Streamlining through automation is not just a practice; it's a philosophy we uphold for an agile and effective development journey.","about.viewpoint.item.collaboration":"Collaboration","about.viewpoint.item.collaboration.content":"We believe the overall development process is a collective effort that goes beyond mere reliance on code repositories and project management tools. Every stage, from development to debugging, testing, and deployment, thrives on collaboration. We are committed to breaking down barriers not only between roles within development teams but also between departments within companies and even among different companies. Our dedication lies in fostering a dynamic and interconnected environment that drives innovation.","about.investor.title":"Invested by","about.office.title":"Our Offices","pricing.subtitle":"Apidog is currently offered as a free solution with no limit on team size, and you can experience all the features of the professional version for free. Apidog will transition to a paid model on August 2023.","pricing.download.design":"API design","pricing.download.debugging":"API debugging","pricing.download.testing":"API testing","pricing.download.doc":"API documentations","pricing.download.mock":"API mocking","pricing.download.domain":"Custom domain","pricing.download.reports":"Test reports storage (online)","pricing.download.image":"Image embedding","pricing.download.projects":"Unlimited projects","pricing.download.team":"Unlimited team size","pricing.download.response":"Response validation engine","pricing.download.smartMocking":"Smart mocking engine","pricing.download.dynamicValues":"Dynamic request values","pricing.download.database":"Database connections","pricing.download.idea":"Apidog IDEA plugin","pricing.download.timeline":"Experience all professional features before August 2023","pricing.download.price":"\u003cspan class='text-[56px]'\u003e$0\u003c/span\u003e / month","pricing.price.title":"Welcome to Apidog, the ultimate API tool. Try it Free for 14 days, and cancel anytime you like!","pricing.price.yearly":"Yearly","pricing.price.monthly":"Monthly","free":"Free","basic":"Basic","professional":"Professional","pricing.price.free.subtitle":"Start designing, developing, and testing APIs.","pricing.price.basic.subtitle":"Collaborate with your team to design, develop, and test APIs faster. Available on August 2023.","pricing.price.professional.subtitle":"Collaborate with your team to design, develop, and test APIs faster. Available on August 2023.","pricing.price.free.feature.1":"API recovery for 7 days","pricing.price.free.feature.2":"API change history for 7 days","pricing.pr /span\u003e","vspostman.title.description":"Apidog is the superior Postman alternative designed to keep your team connected. Unlike Postman's strict limits, \u003cb\u003eApidog’s free plan allows for 4 users\u003c/b\u003e, ensuring that small teams can continue to design, debug, and test APIs together at no cost.","vspostman.why_apidog.title":"Why Choose Apidog Over Postman","vspostman.why_apidog.subtitle":"Postman is restricting team collaboration. Apidog keeps your team connected with a 4-user forever-free plan and unlimited test runs.","vspostman.hero.primaryButton":"Start a Free Team (Up to 4 Seats)","vspostman.hero.secondaryButton":"Migrate from Postman in 1 Click","vspostman.pills.teams":"Free for Teams Up to 4","vspostman.pills.migration":"100% Postman Syntax Compatible","vspostman.pills.platform":"All-in-One API Platform","vspostman.migrateLink":"Explore how to migrate from Postman to Apidog","vspostman.design.postman.title":"Postman Free","vspostman.design.postman.subtitle":"No Free Plan Once You Add a Second User","vspostman.design.postman.userCount":"1 User","vspostman.design.postman.userLimit":"Strict Workspace Limit","vspostman.design.postman.userPrice":"Collaborating teams pay $14+/mo per user","vspostman.design.postman.feature1.title":"25 Collection Runs / Month","vspostman.design.postman.feature1.desc":"Automated testing is capped daily","vspostman.design.postman.feature2.title":"Detached workflow","vspostman.design.postman.feature2.desc":"API specs and collections are separate","vspostman.design.postman.feature3.title":"Manual maintenance","vspostman.design.postman.feature3.desc":"Scripts must be rewritten as APIs evolve","vspostman.design.postman.footer":"1st of March","vspostman.design.apidog.title":"Apidog Free","vspostman.design.apidog.subtitle":"Free Forever for Small Teams","vspostman.design.apidog.userCount":"4 Users","vspostman.design.apidog.userLimit":"Full Team Collaboration","vspostman.design.apidog.userSavings":"SAVE ~$672/YEAR PER TEAM","vspostman.design.apidog.feature1.title":"Unlimited Runs","vspostman.design.apidog.feature1.desc":"Run tests as often as you need with unlimited APIs, requests, and projects","vspostman.design.apidog.feature2.title":"Unified, design-first workflow","vspostman.design.apidog.feature2.desc":"Specs, requests, and mocks stay in sync","vspostman.design.apidog.feature3.title":"Automated maintenance","vspostman.design.apidog.feature3.desc":"Requests and mocks auto-update with spec changes","vspostman.design.apidog.button":"Get Your Free Team Space","vspostman.design.apidog.badge":"RECOMMENDED","vsinsomnia.title.description":"Insomnia falls short for API development teams due to limited support for evolving APIs, requiring \u003cb\u003econstant rewriting of requests and scripts\u003c/b\u003e. Additionally, its \u003cb\u003eseparation of API specifications and collections\u003c/b\u003e can lead to discrepancies and confusion, preventing a unified source of truth for API data.","vsstoplight.title.description":"Stoplight is an API documentation tool; however, the separation of documentation from development, testing, and collections can cause inefficiencies and discrepancies, preventing a unified source of truth for API data.","vshoppscotch.title.description":"Hoppscotch is more of a personal tool, lacking features for team collaboration. It misses pre and post-script capabilities and test suite functionalities, making comprehensive testing difficult.","vsrapidapi.title.description":"Smartbear RapidAPI is more of a personal tool, lacking features for team collaboration. It misses pre and post-script capabilities and test suite functionalities, making comprehensive testing difficult.","vsreadme.title.description":"Readme is a documentation tool; however, the separation of documentation from development, testing, and collections can cause inefficiencies and discrepancies, preventing a unified source of truth for API data.","vspostman.title.content":"Apidog over Postman.","vsx.su rtless synchronization of API specifications and modifications across the entire API lifecycle.","migrationFromPostman.import.title":"Import in 1 minute","migrationFromPostman.import.content":"Supports more than 10 API data types including Postman Collections,  OpenAPI, Swagger, cURL, .HAR, Jmeter, apiDoc, RAML,  I/O Doc, WADL and Google Discovery.","migrationFromPostman.compatible.title":"Compatible with Postman","migrationFromPostman.compatible.content":"Fully supported Postman scripts can be directly executed in API Dog, and can also be set as folder-level scripts or public scripts.","migrationFromPostman.collections.title":"Unlimited runs of collections","migrationFromPostman.collections.content":"API cases can be imported into the test cases for one-click execution, supporting unlimited runs and CI/CD.","migrationFromPostman.button":"How to import Postman data to Apidog ?","downloadApidog":"Download Apidog","apidogWeb":"Apidog Web","apidogCli":"Apidog CLI","apidogIdea":"Apidog IDEA plugin","blog":"Blog","helpCenter":"Help Docs","articles":"Articles","community":"Community","switchFromPostman":"Switch from Postman","vsCompetitors":"vs Competitors","vsBruno":"vs Bruno","Changelog":"Changelog","contactUs":"Contact us","joinUsOnDiscord":"Chat with us on Discord","chatWithUsOnSlack":"Chat with us on Slack","chatWithUsOnX":"Chat with us on X","followUsOnLinkedIn":"Follow us on LinkedIn","subscribeOnYouTube":"Subscribe on YouTube","appCommunity":"Apidog community","feedback":"Feedback","serviceStatus":"Service status","apiRequest":"API request","aboutUs":"About us","apiDoc":"API documentation","apiMocking":"API mocking","features":"Features","design":"API Design","debugging":"API Debugging","documentation":"API Documentation","testing":"API Automated Testing","mocking":"API Mocking","month":"per user / month","meta.index.title":"Apidog: All-in-One API Platform: Design, Debug, Mock, Test, and Document","meta.index.description":"REAL API Design-first Development Platform. Design. Debug. Test. Document. Mock. Build APIs Faster \u0026 Together.","meta.index.keywords":"apidog, API Documentation, API Mocking, API Testing","meta.enterprise.title":"Apidog Enterprise: All-in-One API Platform for Scaling Teams","meta.enterprise.description":"Transform your API workflow with Apidog Enterprise. Advanced security, SSO, RBAC, and dedicated support designed for large-scale development teams.","meta.enterprise.keywords":"Apidog Enterprise, enterprise API management, team API collaboration, API security, SSO API tool, RBAC API software","meta.vsPostman.title":"Apidog vs Postman: 4 Users Free vs 1 User—Best Postman Alternative","meta.vsPostman.description":"Compare Apidog and Postman. Apidog free: 4 users, unlimited API calls and collection runs. Postman free: 1 user. Import from Postman in one click.","meta.apihub.title":"API Hub - Discover and connect to thousands of APIs｜Apidog","meta.apihub.description":"Discover all the APIs you need for your projects at Apidog's API Hub, including Twitter API, Instagram API, GitHub REST API, Notion API, Google API, etc.","loading.redirecting":"Redirecting to your language version...","cookie.content":"We and our partners use cookies to personalize your experience, to show you ads based on your interests, and for measurement and analytics purposes. By using our website and services, you agree to our use of cookies as described in our \u003ca href='https://apidog.com/help/terms-conditions/privacy-policy' target='_blank' class='text-primary ml-1'\u003ePrivacy Policy\u003c/a\u003e.","toWebText":"Launch Web App","homeHref":"https://apidog.com/","canonicalHref":"https://apidog.com/","canonicalPostman":"https://apidog.com/compare/apidog-vs-postman/","canonicalEnterprise":"https://apidog.com/enterprise/","lang":"en","pricing.compare.apiHistory.tips":"The API change history keeps track of changes. You can easily revert to your previous modification history.","pricing.compare.recover.tips":"You can restore deleted items from the trash, including interface documents, test cases, data models, etc.","supportMail":"support@apidog.com","discordChanel":"Yukio_Apidog#4976","noCreditCard":"No credit card required","noTimeLimit":"No time limit on Free plan","migration":"Migration","qa.1.title":"Are the paid plans available for both Web and client-side?","qa.1.content":"All plans include Mac, Windows, Web, and Linux apps.","qa.2.title":"Can I get a free trial?","qa.2.content":"\u003cul\u003e\u003cli\u003eYou can enjoy a 14-day free trial by providing your payment information. After this trial period, billing will occur automatically.\u003c/li\u003e\u003cli\u003eYou have the freedom to cancel the free trial at any time. Even after cancellation, you can continue using the service for the remaining days of your free trial.\u003c/li\u003e\u003c/ul\u003e","qa.3.title":"How to cancel my subscription?","qa.3.content":"\u003cul\u003e\u003cli\u003eThe team administrator can go to the Plan page, click \"Upgrade Plan\", and then click \"Downgrade\" under the Free Plan to cancel the subscription.\u003c/li\u003e\u003cli\u003eOr go to \"Invoices\", click \"Manage Plan\", and then click \"Cancel plan\" on the Stripe page to cancel the subscription.\u003c/li\u003e\u003cli\u003eThe downgrade will take effect at the end of your billing interval.\u003c/li\u003e\u003c/ul\u003e","qa.4.title":"Who can manage upgrades, downgrades, or subscription modifications?","qa.4.content":"\u003cul\u003e\u003cli\u003eOnly the team administrator has the authority to perform upgrades, downgrades, and modify payment information.\u003c/li\u003e \u003cli\u003eAll team members can contribute their own credits to the team.\u003c/li\u003e \u003cli\u003eRelevant emails regarding subscription changes will be sent exclusively to the team administrator.\u003c/li\u003e\u003c/ul\u003e","qa.5.title":"What happens after downgrading the Plan?","qa.5.content":"Your team can continue to use the features of the higher-tier plan normally until the end of the plan's billing cycle.","qa.6.title":"Why are invoices sometimes different from the plan price?","qa.6.content":"There are a few reasons why invoices may differ from the plan price. This usually happens due to changes in your plan, the number of team members, or billing intervals. Here are some possible reasons: \u003cul\u003e\u003cli\u003ePayment with Credits: If you use Credits to pay, the invoice amount will reflect the discounted price after applying for the Credits.\u003c/li\u003e \u003cli\u003eAdding or removing team members: If you added or removed team members during the subscription period, the invoice amount will be adjusted accordingly based on the duration of their membership.\u003c/li\u003e \u003cli\u003ePlan upgrades or downgrades: If you upgraded or downgraded the plan during the subscription period, the invoice amount will reflect the price difference between the previous and current plans for the corresponding time period.\u003c/li\u003e \u003cli\u003eSwitching between annual and monthly plans: If you switched between annual and monthly plans during the subscription period, the invoice amount will be adjusted to reflect the appropriate pricing based on the chosen billing interval.\u003c/li\u003e\u003c/ul\u003e","qa.7.title":"What if I live in a region with a mandatory refund policy?","qa.7.content":"If you live in the European Union, the United Kingdom, or another region that enforces a mandatory refund policy, you may be able to get your monthly membership refunded even if more than 72 hours have passed since you purchased it. For example, customers in the European Union have an extended return policy of 14 days beyond the standard 72-hour period.\u003cbr /\u003e\u003cp class='mt-2'\u003eTo initiate a refund, please contact us through the App or email us at \u003ca class='ui-link' href='mailto:sales@apidog.com'\u003esales@apidog.com\u003c/a\u003e. If there is a mandatory refund policy in your region, please let us know and we will be grateful to assist you.\u003c/p\u003e","qa.8.title":"Unable to use credit card or need invoice first?","qa.8.content":"We support generating an invoice for your order first, which you use to request/audit your budget, and then, depending on your team's situation, we support payment by credit card/bank transfer. Please visit the \u003ca class='ui-link' href='https://apidog.com/help/plans-and-pricing/invoice-required-before-payment'\u003ehelp docs\u003c/a\u003e for further details.","qa.title":"Have other questions?","qa.content.1":"For detailed instructions on Plans, please visit the \u003ca href='https://apidog.com/help/plans-and-pricing/plans-introduction' class='ui-link' target='_blank'\u003eHelp Center\u003c/a\u003e","qa.content.2":"Feel free to reach out if you have any questions, \u003ca href='mailto:sales@apidog.com' class='ui-link' target='_blank'\u003eContact us\u003c/a\u003e","enterpriseContact":"Enterprise Contact","requestADemo":"Request a demo","learnWhichPlan":"Learn which plan is right for your team","getOnboardingHelp":"Get onboarding help","freeTrial":"Start 14-day free trial","viewDemo":"View Demo","feature.apiDesign.title":"API Design","feature.apiDoc.title":"API Documentation","feature.apiDebug.title":"API Debugging","feature.apiTest.title":" API Automated Testing","feature.apiMock.title":"API Mock","compliant.title":"COMPLIANT","compliant.description":"We are committed to the highest standard of security and SOC 2 certified.","innovation.multi.protocol.title":"Multi-protocol Support","innovation.multi.protocol.desc":"Create, organize, share, \u0026 execute HTTP, REST, GraphQL, SOAP, or WebSocket requests without app switching.","innovation.debug.title":"Branches supported","innovation.debug.desc":"Apidog supports branches for independent modifications and testing without affecting the main branch, facilitating agile development.","innovation.idea.title":"Apidog IDEA Plugin","innovation.idea.desc":"The Apidog IDEA plugin allows back-end developers to generate API specifications directly from Javadoc comments and automatically synchronize them with Apidog, without the need for invasive annotations.","innovation.database.title":"Connect to Databases","innovation.database.desc":"Apidog supports retrieving data from databases such as MySQL, SQLServer, Oracle, PostgreSQL, and Clickhouse for use in requests and pre-/post-processors.","innovation.postman.title":"Compatible with Postman","innovation.postman.desc":"Postman scripts can be run directly in Apidog without any modifications needed, and it also supports both public and directory-level scripts.","innovation.apihub.title":"API Hub","innovation.apihub.desc":"You can explore thousands of public APIs from around the world in the API hub, and also publish your own APIs to the API hub.","seamless.ci.cd.integration":"Seamless CI/CD Integration","run.api.tests":"Run API tests effortlessly using the Apidog CLI","integrate.with.popular":"Integrate with popular CI tools, such as Jenkins, for continuous integration.","database.operations":"Database Operations","read.database.data":"Read database data as API request parameters.","use.database.data":"Use database data to validate API request success.","team.collaboration":"Team Collaboration","real.time.interface.data":"Real-time interface data synchronization.","robust.team.project.permission":"Robust team/project permission management, including roles like administrators, members, and read-only access.","supports.multiple.protocols":"Supports Multiple Protocols","supports.http.s.and.grpc.protocol":"Supports HTTP (s) \u0026 gRPC protocol.","supports.socket.tcp":"Supports Socket (TCP), GraphQL, WebSocket and more.","data.import.export":"Data Import/Export","export.data.in.openapi":"Export data in OpenAPI, Markdown, HTML, and other formats.","import.data.from":"Import data from various platforms, including OpenAPI, Postman, HAR, and more.","automatic.code.generation":"Automatic Code Generation","auto.generate.code":"Auto-generate code in 130+ languages and frameworks, including TypeScript, Java, Go, Swift, and more.","customize.code.templates":"Customize code templates to meet your team standards and specific requirements.","fqa.1.title":"I originally used Swagger to maintain API documentation. Is Apidog compatible?","fqa.1.content":"Apidog supports the importation of multiple data formats including OAS/Swagger, Postman, Jmeter, apiDoc, RAP2, etc. When creating a project, you can select the corresponding data format and follow the guide to import data. You can also export the API documentation as OpenAPI format at any time.","fqa.2.title":"I'm used to generating API documentation automatically with OAS/Swagger. Can I use Apidog at the same time?","fqa.2.content":"Apidog provides an automatic synchronization mode that allows for periodic data import from Swagger as API specifications, on which you can further perform API debugging and automated testing. You can set up the data source under \"Settings\" - \"Import Data\" - \"Scheduled\".","fqa.3.title":"I'm accustomed to using Postman for API debugging. How does Apidog accommodate that?","fqa.3.content.1":"You can import Postman Collection data under \"Project Settings\" - \"Import Data\". After importing, the Postman requests will appear under the \"Success\" case of the corresponding API in Apidog.","fqa.3.content.2":"Apidog is compatible with Postman script syntax, allowing Postman scripts to run directly in Apidog.","fqa.3.content.3":"The Run Collection feature of Postman corresponds to the \"Testing\" - \"Test Scenarios\" in Apidog, where you can arrange multiple APIs to run in sequence, supporting conditions and loops, which is more flexible and intuitive than setNextRequest. And there is \u003cb\u003eno running limit\u003c/b\u003e.","fqa.4.title":"What is the difference between \"Design Mode\" and \"Debug Mode\"? What scenarios are they each suitable for?","fqa.4.content":"Design Mode is suitable for teams accustomed to \"designing the API documentation first, then starting to write code\".\u003c/br\u003eIn Design Mode, API documentation and API execution are separate; one side is used to define APIs, and the other is used to run APIs. The advantage of this is that front-end and testers only need to use \"Run\" to send API requests, and backend developers are less likely to make arbitrary changes, ensuring the standardization of the API documentation.\u003c/br\u003eDebug Mode is suitable for teams that prefer to \"write code first and produce API documentation after development is complete\".\u003c/br\u003eIn Debug Mode, you can design APIs alongside development. The backend can easily modify requests without considering the API documentation, and an API document will be automatically generated after debugging is complete.\u003c/br\u003e","fqa.5.title":"Can Apidog debug internal network APIs?","fqa.5.content":"The Apidog client version can debug internal network APIs, but only if the device with Apidog installed can connect to the public internet to retrieve data.","fqa.6.title":"What is the difference between the Apidog client and web versions?","fqa.6.content":"The core functions of Apidog's client and web versions are consistent. However, due to browser limitations, the web version may not be able to implement certain features (such as requesting internal-network APIs, setting specific headers). In contrast, the client version has full functionality.","fqa.7.title":"Where is Apidog data stored?","fqa.7.content":"Apidog global's servers are located in the United States. However, we also offer \u003ca class='ui-link' href='https://apidog.com/help/eu/' target='_blank'\u003eApidog Europe\u003c/a\u003e, with servers placed in Europe to ensure that users can manage and access their data with the assurance that it aligns with local performance and regulatory standards.\u003c/br\u003ePlease note that the account system of \u003ca class='ui-link' href='https://apidog.com/help/eu/' target='_blank'\u003eApidog Europe\u003c/a\u003e is independent of Apidog global, and accounts from Apidog Europe cannot join Apidog global's teams. Therefore, if you need intercontinental collaboration, we recommend choosing Apidog global.","frequently.asked.questions":"Frequently asked questions","frequently.asked.questions.content":"\u003cspan'\u003eFor detailed instructions on Plans, please visit the Help Center.\u003c/span\u003e\u003cspan\u003e Feel free to reach out if you have any questions.\u003c/span\u003e","request.demo":"Request Demo","annual.plan.only":"Annual plan only","apidog.for.nonprofits.and.education":"Apidog for nonprofits \u0026 education","nonprofits.and.education.desc":"We offer free access for accredited educational institutions and a 50% discount for non-profit organizations.","nonprofits.and.education.btn":"Apply via Email","build.api.title":"Build APIs Faster \u0026 Together","build.api.description":"Design. Debug. Test. Document. Mock.","build.api.learn.more.button.text":"Learn More","build.api.1.title":"API Design","build.api.1.description":"Simplify your API design workflow, design and test your APIs, while generating JSON/XML schemas with a simple click.","build.api.2.title":"API Documentation","build.api.2.description":"Documentation generated from your API specification, always kept up-to-date. Customize domains, headers, and layouts to match your brand and enhance user experience.","build.api.3.title":"API Debugging","build.api.3.description":"Automatically validate response results and generate API documentation upon debugging completion.","build.api.4.title":"Smart Mock","build.api.4.description":"Our smart mocking feature automatically generates data based on field names, while advanced mocking returns specified data tailored to requests.","build.api.5.title":"Automated Testing","build.api.5.description":"Generate test cases directly by adding your API endpoints, visually define assertions, and create test scenarios with branch support.","apidoc.hero.type":"API Documentation","apidoc.hero.slogan":"Publish Beautiful API Docs\u003cbr/\u003eStraight from Your Spec","apidoc.hero.description":"Instantly generate stunning, professional API documentation the moment your API specified","apidoc.hero.primary.button.text":"View Docs","apidoc.hero.secondary.button.text":"Launch App","apidoc.vs.traditional.title":"Traditional API Documentation","apidoc.vs.traditional.tag.1":"Lacks Design Appeal","apidoc.vs.traditional.tag.2":"Complex API Design","apidoc.vs.traditional.tag.3":"Debugging Challenges","apidoc.vs.traditional.tag.4":"Limited team collaboration","apidoc.vs.traditional.tag.5":"Limited Page Customization","apidoc.vs.traditional.tag.6":"Manual OpenAPI Spec JSON/YAML Writing","apidoc.vs.apidog.title":"Apidog API Documentation","apidoc.vs.apidog.tag.1":"Fully Compatible with OAS","apidoc.vs.apidog.tag.2":"Online Debugging","apidoc.vs.apidog.tag.3":"Visually Intuitive API Design","apidoc.vs.apidog.tag.4":"Automatic Code Generation","apidoc.vs.apidog.tag.5":"Personalized Design Options","apidoc.vs.apidog.tag.6":"Enhanced Team Collaboration","apidoc.vs.apidog.tag.7":"API-Design First","apidoc.vs.apidog.tag.8":"Auto-Generated Docs","apidoc.vs.apidog.tag.9":"Engaging and User-Friendly Design","apidoc.api.tech.title":"Support all common API technologies","apidoc.seamless.integration.title":"API and Markdown integrated in harmony","apidoc.seamless.integration.description":"Apidog eliminates the need to manage separate API and Markdown documentation files. Instead, you can seamlessly integrate them within your documentation, creating a cohesive and informative experience for developers.","apidoc.seamless.integration.view.docs.button.text":"View Docs","apidoc.seamless.integration.markdown.title":"Rich Markdown Components","apidoc.seamless.integration.markdown.description":"Engage your audience and boost understanding with Apidog’s rich Markdown component library (videos, Mermaid flowcharts, tabs, and more), including full compatibility with MDX component syntax. Go beyond plain text! Create beautiful, informative docs that keep developers hooked.","apidoc.seamless.integration.markdown.admonition":"Admonition","apidoc.seamless.integration.markdown.admonition.description":"The Admonition  component  support for 7 distinct color schemes, enabling the emphasis of various types of critical or pertinent information. Additionally, the Highlight component allows for customization of displaying and hiding emojis and icons for a more personalized presentation","apidoc.seamless.integration.markdown.tabs":"Tabs","apidoc.seamless.integration.markdown.tabs.description":"The Tab component is a common UI element that lets users switch between tabs to view content within the same interface. It organizes related information, allowing quick and easy access to different data without leaving the current page.","apidoc.seamless.integration.markdown.image":"Image Frame","apidoc.seamless.integration.markdown.image.description":"Image Frame is an HTML element for displaying images. Used in various applications, it serves as a container that enhances the visual effect and layout of images.","apidoc.seamless.integration.markdown.accordions":"Accordions","apidoc.seamless.integration.markdown.accordions.description":"An accordion has collapsible panels that users can expand or hide by clicking on the titles. When one panel opens, others collapse, keeping the interface tidy and content manageable.","apidoc.seamless.integration.markdown.grid":"Multiple columns","apidoc.seamless.integration.markdown.grid.description":"To provide for a better user experience when reading text making use of a large screen, you should limit the width of text by using columns side by side, just as newspapers do.","apidoc.seamless.integration.markdown.cards":"Cards","apidoc.seamless.integration.markdown.cards.description":"The Cards component is a popular UI element in modern web and mobile apps, used to display information clearly and attractively. Customizable icons highlight key content or links, enhancing visual representation and user interaction.","apidoc.seamless.integration.markdown.steps":"Steps","apidoc.seamless.integration.markdown.steps.description":"The Steps component, or progress indicator, helps users navigate sequential tasks and displays process progress, enhancing the user experience in complex workflows.","apidoc.seamless.integration.markdown.tips":"Tips","apidoc.seamless.integration.markdown.tips.description":"The removal of non-essential elements from the document has enhanced its readability and utility.","apidoc.functions.title":"Go Beyond Beautiful: Powerful \u0026 Collaborative API Docs","apidoc.functions.1.title":"Personalize Page Layout and Design","apidoc.functions.1.description":"Create a unified brand experience!  Apidog lets you customize your API documentation's navigation, layout, and styling.  Personalize your API documentation, ensuring a consistent look and feel.","apidoc.functions.2.title":"Automated Code Generation","apidoc.functions.2.description":"Apidog documentation supports generating API request samples and schema code in over 20 languages, saving you time and effort.  Customize code templates to suit your unique requirements.","apidoc.functions.3.title":"Debug Directly in API Docs","apidoc.functions.3.description":"Share your API documentation online and enable your external partners and API consumers to debug API endpoints directly within the API documentation.","apidoc.functions.4.title":"API Docs Versioning Control","apidoc.functions.4.description":"Publish and maintain multiple versions concurrently, allowing users to switch between them with a single click. This ensures API developers and consumers always have access to the most relevant information, regardless of the API version they're working with.","apidoc.functions.5.title":"Content Search","apidoc.functions.5.tag":"Coming soon","apidoc.functions.5.description":"Make it easy for your community to find what they need in your documentation. We proudly support Algolia documentation search.","apidoc.functions.6.title":"Change History","apidoc.functions.6.description":"Easily track and understand changes in API specification, with the ability to compare and revert to previous versions with a single click.","apidoc.create.doc.title":"Maintain API docs together with API specs.","apidoc.create.doc.1.title":"Visualize \u0026 Design","apidoc.create.doc.1.description":"Apidog follows OpenAPI/Swagger standards and supports JSON Schema. Our visual input interface makes designing your API docs intuitive and efficient.","apidoc.create.doc.1.button.text":"Learn More","apidoc.create.doc.tabs.left.text":"API Design","apidoc.create.doc.tabs.right.text":"Markdown Design","apidoc.create.doc.2.title":"Import \u0026 Transform","apidoc.create.doc.2.description":"Breathe new life into existing API docs. Import files like OpenAPI Spec, Postman, RAML, etc., Apidog will automatically convert them into beautiful and interactive API documentation.","apidoc.create.doc.3.title":"Code \u0026 Generate","apidoc.create.doc.3.description":"The Apidog Helper IDEA plugin automatically parses code annotations for quick API doc generation and keeps your API documentation in sync.","apidoc.enterprise.grade.title":"Create Enterprise-Grade API Documentations","apidoc.enterprise.grade.1.title":"Custom Domain \u0026 Auto Generate SSL Certificate","apidoc.enterprise.grade.1.description":"Establish a professional and secure online presence for your API documentation with Apidog.  Set a custom domain that aligns with your brand identity, and let Apidog automatically generate an SSL certificate to safeguard your docs and protect user data.","apidoc.enterprise.grade.2.title":"Secure Your Docs with Password Protection","apidoc.enterprise.grade.2.description":"Safeguard your API documentation with Apidog's robust password protection features. Set strong passwords, either randomly generated or custom-defined, to control access to your shared docs.  For added security, establish an expiration time for these passwords, ensuring that unauthorized access is limited.","apidoc.enterprise.grade.3.title":"Expand Your Reach: Publish to Apidog Hub","apidoc.enterprise.grade.3.description":"Share your API projects publicly by publishing them to Apidog's API Hub, allowing millions of developers to easily discover and integrate your API.","apidoc.clients.title":"Our Clients' Docs Speak for Us","postman.migration.title":"Migrate to Apidog","postman.migration.description":"Migrate easily and get started with Apidog's powerful features right away.","postman.migration.button.text":"How to Migrate from Postman to Apidog","api.design.hero.type":"API Design","api.design.hero.title":"Design Great APIs Without Writing YAML","api.design.hero.description":"Visually design industry-grade APIs following the OpenAPI spec, all without a steep learning curve.","api.design.hero.primary.button.text":"Download","api.design.hero.secondary.button.text":"Launch App","api.design.tools.title":"Visually-Appealing Tools for API Design","api.design.tools.1.title":"Visually-Appealing Tools for API Design","api.design.tools.1.description":"Complies with OpenAPI specifications, supports JSON Schema, and offers an intuitive visual interface. Start quickly with no barriers—no need for manual scripting of JSON or YAML—and define APIs quickly with zero learning curve.","api.design.tools.1.button.text":"Learn More","api.design.tools.2.title":"Reusable Schemas and Components","api.design.tools.2.description":"Apidog offers Schemas, Common Parameters, Responses Components and Default Response Template. Modifying a component file updates all referenced parts automatically. Fully compatible with OAS component specifications.","api.design.tools.3.title":"OAS Compatible Advanced Setting","api.design.tools.3.description":"Supports configuration of enums, maximum and minimum values, such as: \u003cul\u003e\u003cli\u003e· Query, Path, Header, Cookie \u003c/li\u003e\u003cli\u003e· form-data, x-www-form-urlencoded, JSON\u003c/li\u003e\u003c/ul\u003e","api.design.tools.4.title":"Import Schemas from Database","api.design.tools.4.description":"Import schemas by connecting directly to the database, saving valuable development time and enhancing efficiency.","api.design.tools.5.title":"Fully compatible with OAS","api.design.tools.5.description":"Apidog is fully compatible with the OpenAPI format, allowing users to seamlessly import/export OpenAPI format at any time.","api.design.tailored.title":"Tailored to Your API Development Approach","api.design.tailored.subtitle":"API Design-First","api.design.tailored.description":"Plan first, build together: Define your APIs upfront for deeper collaboration, reusability, and long-term scalability.","api.design.discover.title":"Discover the Power of Collaborative API Design","api.design.discover.1.title":"Real-time Collaboration","api.design.discover.1.description":"Collaborate and design together during the development process, with changes automatically synced across team. Build amazing APIs together with Apidog.","api.design.discover.2.title":"Agile Development with Sprint Branches","api.design.discover.2.description":"Take control of your API development process with Sprint Branches. Ensure data stability, compare changes before merging, and merge with a single click.","api.design.discover.3.title":"API Docs Version Control","api.design.discover.3.description":"Publish and maintain multiple versions concurrently, allowing users to switch between them with a single click. This ensures API developers and consumers always have access to the most relevant information, regardless of the API version they're working with.","api.mocking.hero.type":"API Mocking","api.mocking.hero.title":"Instant Mock APIs","api.mocking.hero.subtitle":"From Spec to Server in Seconds","api.mocking.hero.description":"Design, generate, and manage realistic mock APIs with ease. Build complete frontend features without waiting for backend development.","api.mocking.hero.primary.button.text":"Download","api.mocking.hero.secondary.button.text":"Launch App","api.mocking.zero.config.title":"Auto-Generate Mock Data with Zero Configuration","api.mocking.zero.config.part.1.title":"Auto-Generate from API Specs","api.mocking.zero.config.part.1.card.1.title":"Mock Endpoints: No Manual Setup","api.mocking.zero.config.part.1.card.1.description":"Automatically generate mock endpoint responses based on your API specifications. This ensures your mock data always stays in sync with your API design.","api.mocking.zero.config.part.1.card.2.title":"Auto-Generate Realistic Mock Data","api.mocking.zero.config.part.1.card.2.description":"Automatically generate user-friendly mock data based on your API specifications. Our system creates data that closely mimics real-world scenarios, covering a wide range of possible use cases.","api.mocking.zero.config.part.2.title":"Granular Control Over Mock Data Generation","api.mocking.zero.config.part.2.paragraph.1":"Tailor mock data generation to meet the specific requirements of each schema field within your API specification.","api.mocking.zero.config.part.2.paragraph.2":"Apidog supports a wide range of data types, including strings, integers, floating-point numbers, booleans, various date-time formats, and more. This comprehensive support ensures precise control and realistic data simulation for all your API mocking needs.","api.mocking.precision.title":"Mock with Precision: From Simple Rules to Complex Scripts","api.mocking.precision.1.title":"Mock Expectations: Custom Mock Rule Library","api.mocking.precision.1.description":"Visually define custom mock rules to return dynamic data based on specific parameters.","api.mocking.precision.2.title":"Mock Script：Handle Complex Scenarios","api.mocking.precision.2.description":"Use custom scripts to modify request parameters, headers, cookies, and more. Create highly tailored mock responses for any scenario.","api.mocking.server.title":"Power Up Your API Development with Mock Server","api.mocking.server.1.title":"Flexible Mock Servers for API Development","api.mocking.server.1.description":"Apidog’s Mock Server is designed to work smoothly with your existing APIs and workflows, enhancing the flexibility and speed of your development process. Incorporate it easily into your projects to streamline testing and development.","api.mocking.server.2.title":"Real-Time Team Collaboration","api.mocking.server.2.description":"Work together with your team to design and build APIs. Changes are automatically synced, ensuring everyone is always on the same page. Build amazing APIs together with Apidog.","api.mocking.create.title":"Choose the Mock Server That's Right for You","api.mocking.create.1.title":"Local Mock","api.mocking.create.1.description":"Have your mock server running directly on your computer with Apidog client for easy access and rapid development.","api.mocking.create.2.title":"Cloud Mock","api.mocking.create.2.description":"Enable and access cloud mock hosted on Apidog server for team collaboration. Ideal for distributed teams and collaborative projects.","api.mocking.create.3.title":"Self-Hosted Mock","api.mocking.create.3.description":"Host your own mock server for maximum control, security, and compliance. Ideal for organizations with strict security and data privacy requirements.","api.debugging.hero.type":"API Debugging","api.debugging.hero.title":"The API Client That Knows Your Spec","api.debugging.hero.description":"Simply make API requests, auto-validate responses, and instantly generate documentation.","api.debugging.hero.primary.button.text":"Download","api.debugging.hero.secondary.button.text":"Launch App","api.debugging.automatically.title":"Automatically Generate Requests for Debugging","api.debugging.automatically.1.title":"Generate Request Params/Body Based on API Spec","api.debugging.automatically.1.description":"Au
